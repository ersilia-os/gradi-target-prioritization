name: Deploy Target Selector to Pages

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp asset cache-bust with the commit SHA
        run: |
          # rewrite ?v=… on the CSS/JS asset tags so every deploy ships uniquely-versioned
          # assets (no manual bumping, no stale-cache after a deploy)
          sed -i "s/?v=[0-9A-Za-z._-]*/?v=${GITHUB_SHA::12}/g" app/index.html
          grep -o '?v=[0-9A-Za-z._-]*' app/index.html | sort -u
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app          # publish the app/ folder as the site root
      - id: deployment
        uses: actions/deploy-pages@v4
